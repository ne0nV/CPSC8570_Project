experiment_name: "baseline_fl_demo"
num_clients: 50 #og is 100
num_attackers: 5
rounds: 10 #og is 100
dataset: "FashionMNIST"
model: "SimpleCNN"
attacks:
  - type: "label_flipping"
    source_label: 4 # cifar is 0 but fashion is 4 (coat)
    target_label: 6 # cifar is 2 but fashion is 6 (shirt)
defenses:
  aggregation: "krum"
  differential_privacy: true
  dp_std: 0.1
  trust_system: true
logging:
  output_dir: "logs/"
